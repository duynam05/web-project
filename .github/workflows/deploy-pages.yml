name: Deploy Frontends To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            Frontend/bookstore-ui/package-lock.json
            Frontend/bookstore-admin/package-lock.json

      - name: Install user app dependencies
        run: npm ci
        working-directory: Frontend/bookstore-ui

      - name: Build user app
        run: npm run build
        working-directory: Frontend/bookstore-ui

      - name: Install admin app dependencies
        run: npm ci
        working-directory: Frontend/bookstore-admin

      - name: Build admin app
        run: npm run build
        working-directory: Frontend/bookstore-admin

      - name: Assemble Pages artifact
        run: |
          mkdir -p site/admin
          cp -R Frontend/bookstore-ui/build/. site/
          cp -R Frontend/bookstore-admin/dist/. site/admin/
          touch site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
