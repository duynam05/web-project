server:
  port: ${PORT:8080}

spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
#    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/bookstore1}
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/bookstore1}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: 30000
      maximum-pool-size: 10


  jpa:
#    hibernate:
#      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
#    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
      defer-datasource-initialization: true

jwt:
  signer-key: ${JWT_SIGNER_KEY}
  valid-duration: ${JWT_VALID_DURATION:360000}
  refreshable-duration: ${JWT_REFRESHABLE_DURATION:36000}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  folder: ${CLOUDINARY_FOLDER:bookstore}

app:
  bootstrap:
    admin:
      enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:true}
      email: ${APP_BOOTSTRAP_ADMIN_EMAIL:}
      password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}
      full-name: ${APP_BOOTSTRAP_ADMIN_FULL_NAME:Administrator}
  payment:
    bank-transfer:
      bank-id: ${APP_PAYMENT_BANK_TRANSFER_BANK_ID:970418}
      bank-name: ${APP_PAYMENT_BANK_TRANSFER_BANK_NAME:BIDV}
      account-number: ${APP_PAYMENT_BANK_TRANSFER_ACCOUNT_NUMBER:8860383073}
      account-holder: ${APP_PAYMENT_BANK_TRANSFER_ACCOUNT_HOLDER:TRINH DUY NAM}
      session-expiry-minutes: ${APP_PAYMENT_BANK_TRANSFER_SESSION_EXPIRY_MINUTES:15}
    payos:
      enabled: ${APP_PAYMENT_PAYOS_ENABLED:true}
      use-for-bank-transfer: ${APP_PAYMENT_PAYOS_USE_FOR_BANK_TRANSFER:true}
      environment: ${APP_PAYMENT_PAYOS_ENVIRONMENT:production}
      base-url: ${APP_PAYMENT_PAYOS_BASE_URL:https://api-merchant.payos.vn}
      client-id: ${PAYOS_CLIENT_ID:}
      api-key: ${PAYOS_API_KEY:}
      checksum-key: ${PAYOS_CHECKSUM_KEY:}
      partner-code: ${PAYOS_PARTNER_CODE:}
      webhook-url: ${APP_PAYMENT_PAYOS_WEBHOOK_URL:https://web-project-2-viwf.onrender.com/api/payments/payos/webhook}
      return-url-base: ${APP_PAYMENT_PAYOS_RETURN_URL_BASE:https://duynam05.github.io/web-project/#/payment-result}
      cancel-url-base: ${APP_PAYMENT_PAYOS_CANCEL_URL_BASE:https://duynam05.github.io/web-project/#/checkout}
      expiry-minutes: ${APP_PAYMENT_PAYOS_EXPIRY_MINUTES:15}
      sync-enabled: ${APP_PAYMENT_PAYOS_SYNC_ENABLED:true}
      sync-fixed-delay-ms: ${APP_PAYMENT_PAYOS_SYNC_FIXED_DELAY_MS:30000}
      sync-batch-size: ${APP_PAYMENT_PAYOS_SYNC_BATCH_SIZE:25}
      cancel-on-order-cancel: ${APP_PAYMENT_PAYOS_CANCEL_ON_ORDER_CANCEL:true}
